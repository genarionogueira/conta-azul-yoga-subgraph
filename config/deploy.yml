# Kamal deploy — AVCD Conta Azul Yoga Subgraph (Traefik path prefix on avcd_edge)
# CI replaces __DO_DEPLOY_HOST__ (SSH), __DO_PUBLIC_HOST__ (Traefik Host), __DOCR_REGISTRY_SERVER__.

service: avcd-conta-azul-yoga-subgraph
# GHCR (free): ghcr.io/avocado-technology/conta-azul-yoga-subgraph — image name must be lowercase.
image: avocado-technology/conta-azul-yoga-subgraph

deploy_timeout: 180

ssh:
  user: __DO_DEPLOY_USER__

servers:
  web:
    hosts:
      - __DO_DEPLOY_HOST__
    proxy: false
    options:
      network: avcd_edge
      health-cmd: "wget -qO- http://localhost:4000/health || exit 1"
      health-interval: 15s
      health-retries: 12
      health-timeout: 10s
      health-start-period: 60s
    labels:
      traefik.enable: "true"
      traefik.docker.network: avcd_edge
      traefik.http.middlewares.avcd-conta-azul-yoga-strip.stripprefix.prefixes: /conta-azul-yoga-subgraph
      traefik.http.routers.avcd-conta-azul-yoga.rule: Host(`__DO_PUBLIC_HOST__`) && PathPrefix(`/conta-azul-yoga-subgraph`)
      traefik.http.routers.avcd-conta-azul-yoga.entrypoints: websecure
      traefik.http.routers.avcd-conta-azul-yoga.middlewares: avcd-conta-azul-yoga-strip
      traefik.http.routers.avcd-conta-azul-yoga.tls: "true"
      traefik.http.routers.avcd-conta-azul-yoga.tls.certresolver: le
      traefik.http.routers.avcd-conta-azul-yoga.priority: "116"
      traefik.http.routers.avcd-conta-azul-yoga.service: avcd-conta-azul-yoga
      traefik.http.services.avcd-conta-azul-yoga.loadbalancer.server.port: "4000"

registry:
  server: __DOCR_REGISTRY_SERVER__
  username:
    - DOCR_USERNAME
  password:
    - REGISTRY_PASSWORD

builder:
  arch: amd64
  context: .
  dockerfile: Dockerfile

env:
  secret:
    - REDIS_URL
    - MONGODB_URL
    - CONTA_AZUL_CLIENT_ID
    - CONTA_AZUL_CLIENT_SECRET
    - JWT_SECRET
  clear:
    PORT: "4000"
    NODE_ENV: production
    CONTA_AZUL_API_BASE_URL: https://api-v2.contaazul.com
    CONTA_AZUL_TOKEN_URL: https://auth.contaazul.com/oauth2/token
    CONTA_AZUL_AUTH_URL: https://auth.contaazul.com/login
    CONTA_AZUL_OAUTH_SCOPE: openid profile aws.cognito.signin.user.admin
    CONTA_AZUL_REDIRECT_URI: https://dev.avocado.tech/conta-azul-yoga-subgraph/callback
    WEB_DASH_PUBLIC_URL: https://__DO_PUBLIC_HOST__
    SALES_SYNC_DAYS: "90"
    JWT_ISSUER: avcd
    JWT_AUDIENCE: conta-azul-service
