# Local auth-enabled stack — validates Zitadel JWTs on /graphql.
# Usage: docker compose -f docker-compose.yml -f docker-compose.auth.yml up --build
#
# Requires ZITADEL_ISSUER and ZITADEL_PROJECT_ID (must match web-dash ZITADEL_PROJECT_ID).

services:
  yoga-subgraph:
    environment:
      JWT_REQUIRED: "true"
      ZITADEL_ISSUER: ${ZITADEL_ISSUER:-https://zitadel.avcd.ai}
      ZITADEL_PROJECT_ID: ${ZITADEL_PROJECT_ID:-}
      KEYCLOAK_ENABLED: "false"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,https://dev.avocado.tech
