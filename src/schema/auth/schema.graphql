extend type Query {
  contaAzulAuthConfig: ContaAzulAuthConfig!
  authorizationUrl(storeId: ID!, returnUrl: String): OAuthUrl!
  connectionStatus(storeId: ID!): ConnectionStatus!
  connectedStores: [ConnectedStoreSummary!]!
  connections: [ContaAzulConnection!]!
}

extend type Mutation {
  setupConnection(storeId: ID!, code: String!, state: String!, name: String): SetupResult!
  completeOAuthCallback(code: String!, state: String!, name: String): SetupResult!
  disconnectStore(storeId: ID!): DisconnectResult!
  updateConnection(id: ID!, name: String!): UpdateConnectionResult!
}

type ContaAzulAuthConfig {
  redirectUri: String
  authUrl: String!
  tokenUrl: String!
  clientIdConfigured: Boolean!
}

type OAuthUrl {
  storeId: ID!
  url: String!
  state: String!
}

type SetupResult {
  success: Boolean!
  storeId: ID!
  error: String
}

type ConnectionStatus {
  storeId: ID!
  isConnected: Boolean!
  connectedAt: String
  expiresAt: String
  error: String
}

type ConnectedStoreSummary {
  storeId: ID!
  isConnected: Boolean!
  connectedAt: String
  expiresAt: String
}

type ContaAzulConnection {
  id: ID!
  name: String!
  connectedAt: String
  isConnected: Boolean!
}

type DisconnectResult {
  success: Boolean!
  storeId: ID!
  error: String
}

type UpdateConnectionResult {
  success: Boolean!
  id: ID!
  name: String
  error: String
}
