enum WorkerSyncEventType {
  RECONCILE_STARTED
  RECONCILE_COMPLETED
  RECONCILE_FAILED
  SALES_RECONCILE_STARTED
  SALES_RECONCILE_COMPLETED
  SALES_RECONCILE_FAILED
  SALE_ITEMS_RECONCILE_STARTED
  SALE_ITEMS_RECONCILE_COMPLETED
  SALE_ITEMS_RECONCILE_FAILED
  VENDEDORES_RECONCILE_STARTED
  VENDEDORES_RECONCILE_COMPLETED
  VENDEDORES_RECONCILE_FAILED
  STORE_DATA_DELETED
  RECONCILE_CYCLE_COMPLETED
  WORKER_LOG
}

type WorkerSyncEvent @shareable {
  type: WorkerSyncEventType!
  tenantId: ID!
  storeId: ID
  trigger: String
  status: String
  inserted: Int
  updated: Int
  deleted: Int
  skipped: Int
  durationMs: Int
  errorMessage: String
  message: String
  level: String
  at: String!
}

type WorkerSyncEventConnection {
  events: [WorkerSyncEvent!]!
}

extend type Query {
  contaAzulWorkerSyncEvents(storeId: ID, limit: Int = 20): WorkerSyncEventConnection!
}

extend type Subscription {
  contaAzulWorkerSyncEvents(storeId: ID): WorkerSyncEvent!
}
