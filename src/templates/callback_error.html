<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Connection failed</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f9fafb; min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 2rem; max-width: 28rem; width: 100%; text-align: center; }
    .err { color: #ef4444; font-size: 2rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
    p { color: #6b7280; font-size: .875rem; margin-bottom: 1rem; }
    a { display: inline-block; background: #f3f4f6; color: #374151; padding: .5rem 1rem; border-radius: 6px; text-decoration: none; font-size: .875rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="err">✗</div>
    <h1>Connection failed</h1>
    <p>{{ERROR}}</p>
    <a href="/connect">Try again</a>
  </div>
</body>
</html>
