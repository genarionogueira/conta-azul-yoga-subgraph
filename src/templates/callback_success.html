<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Connected</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f9fafb; min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 2rem; max-width: 28rem; width: 100%; text-align: center; }
    .ok { color: #16a34a; font-size: 2rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
    p { color: #6b7280; font-size: .875rem; margin: .25rem 0; }
    a { color: #15803d; font-size: .875rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="ok">✓</div>
    <h1>Store connected</h1>
    <p>Store: <strong>{{STORE_ID}}</strong></p>
    {{ACCOUNT_LINE}}
    <p><a href="/connect">Connect another store</a></p>
  </div>
</body>
</html>
